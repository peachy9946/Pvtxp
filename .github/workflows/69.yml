name: CI

on: [push, workflow_dispatch]

jobs:
  build:

    runs-on: windows-2022

    steps:
    - run: Install-Module -Name Microsoft.WinGet.Client -Force
    - run: Repair-WinGetPackageManager -Latest -AllUsers
    - run: winget install --id WireGuard.WireGuard --accept-source-agreements
    - name: Install Free Download Manager
      run: winget install --id SoftDeluxe.FreeDownloadManager --accept-source-agreements --accept-package-agreements
    - name: Install OneDrive
      run: winget install --id Microsoft.OneDrive --accept-source-agreements --accept-package-agreements
    - name: Enable TS
      run: Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server'-name "fDenyTSConnections" -Value 0
    - run: Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
    - name: Set Password
      run: Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText $env:PASSWORD -Force)
      env:
        PASSWORD: ${{ secrets.PASSWORD }}
    - run: choco install cloudflared
    - name: Create Tunnel
        shell: powershell
        run: |
          # 1. Launch cloudflared in the background so it doesn't block GitHub Actions
          Start-Process cloudflared `
            -ArgumentList "tunnel --url tcp://localhost:3389 --protocol http2 --loglevel info --retries 999" `
            -RedirectStandardError cloudflared-error.log `
            -RedirectStandardOutput cloudflared.log

          Write-Host "Waiting for Cloudflare Tunnel URL..."
          $timeout = 45
          $elapsed = 0
          $found = $false

          # 2. Poll the error log file until the URL appears
          while ($elapsed -lt $timeout) {
            Start-Sleep -Seconds 3
            $elapsed += 3

            if (Test-Path cloudflared-error.log) {
              $log = Get-Content cloudflared-error.log -Raw
              if ($log -match "https://[a-zA-Z0-9-]+\.trycloudflare\.com") {
                $url = $matches[0]
                Write-Host "============================================="
                Write-Host "SUCCESS! Tunnel URL: $url"
                Write-Host "============================================="
                $found = $true
                break
              }
            }
          }

          # 3. If it fails or times out, print the logs to diagnose
          if (-not $found) {
            Write-Error "Failed to retrieve Tunnel URL within $timeout seconds."
            if (Test-Path cloudflared-error.log) { Get-Content cloudflared-error.log }
            exit 1
          }

      - name: Keep Runner Alive
        shell: powershell
        run: |
          Write-Host "Runner active. Press Cancel on GitHub to terminate."
          while ($true) {
            Start-Sleep -Seconds 60
          }
